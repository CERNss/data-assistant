[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

[INPUT]
    Name          forward
    Listen        0.0.0.0
    Port          24224
    Tag           docker.*

[FILTER]
    Name          parser
    Match         docker.*
    Key_Name      log
    Parser        app_json
    Reserve_Data  On

[OUTPUT]
    Name          opentelemetry
    Match         docker.*
    Host          ${FB_OTLP_HOST}
    Port          ${FB_OTLP_PORT}
    Logs_uri      ${FB_OTLP_LOGS_URI}
    Tls           ${FB_OTLP_TLS}
    Tls.verify    ${FB_OTLP_TLS_VERIFY}
