name: Python Docker Hub

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
    tags:
      - "python-v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  IMAGE_PREFIX: data-assistant

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Compile Python sources
        run: python -m compileall logger_service processor_service contracts tests

  docker:
    name: Build and push Python ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: logger
            dockerfile: logger_service/Dockerfile
          - service: processor
            dockerfile: processor_service/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Docker metadata inputs
        id: docker-inputs
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_PLATFORMS: ${{ vars.DOCKER_PLATFORMS }}
        run: |
          namespace="${DOCKERHUB_NAMESPACE:-$DOCKERHUB_USERNAME}"
          platforms="${DOCKER_PLATFORMS:-linux/amd64,linux/arm64}"
          if [ -z "$namespace" ]; then
            echo "DOCKERHUB_NAMESPACE variable or DOCKERHUB_USERNAME secret is required." >&2
            exit 1
          fi
          echo "namespace=$namespace" >> "$GITHUB_OUTPUT"
          echo "platforms=$platforms" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.docker-inputs.outputs.namespace }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ steps.docker-inputs.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=python-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=python-${{ matrix.service }}
