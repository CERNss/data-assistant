services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    restart: unless-stopped
    networks:
      - data-assistant-net

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db
    ports:
      - "25432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - data-assistant-net

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: pgadmin
    ports:
      - "25050:80"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - data-assistant-net

  processor:
    build:
      context: .
      dockerfile: Dockerfile.processor
    env_file:
      - .env
    environment:
      CHAT_IMAGE_NATS_ENABLED: "true"
      CHAT_IMAGE_NATS_SERVERS: "nats://nats:4222"
      CHAT_IMAGE_TAGGER_ENABLED: "true"
      CHAT_IMAGE_TAGGER_TOOL_ROOT: "/opt/tagger"
      CHAT_IMAGE_SAVE_DIR: "/app/data/chat_images"
      GROUP_IMAGE_SAVE_DIR: "/app/data/chat_images"
      CHAT_IMAGE_TAGGER_QUEUE_FILE: "/app/data/chat_image_tagger_queue.json"
      CHAT_IMAGE_TAGGER_RUN_ROOT: "/app/data/chat_image_tagger_runs"
      CHAT_IMAGE_TAGGER_AUDIT_LOG_FILE: "/app/data/group_image_tags.jsonl"
      OTEL_SERVICE_NAME: "data-assistant-processor"
    volumes:
      - chat-data:/app/data
      - ${CHAT_IMAGE_TAGGER_TOOL_ROOT_HOST:?set CHAT_IMAGE_TAGGER_TOOL_ROOT_HOST in .env}:/opt/tagger:ro
    depends_on:
      - nats
    restart: unless-stopped
    networks:
      - data-assistant-net

  logger:
    build:
      context: .
      dockerfile: Dockerfile.logger
    env_file:
      - .env
    environment:
      NAPCAT_WS_HOST: "0.0.0.0"
      NAPCAT_WS_PORT: "3001"
      NAPCAT_ACTION_TIMEOUT_SEC: "8.0"
      CHAT_IMAGE_NATS_ENABLED: "true"
      CHAT_IMAGE_NATS_SERVERS: "nats://nats:4222"
      CHAT_IMAGE_TAGGER_ENABLED: "false"
      CHAT_IMAGE_SAVE_DIR: "/app/data/chat_images"
      GROUP_IMAGE_SAVE_DIR: "/app/data/chat_images"
      OTEL_SERVICE_NAME: "data-assistant-logger"
      POSTGRES_DSN: "postgresql://admin:password@db:5432/app_db"
    ports:
      - "3001:3001"
    volumes:
      - chat-data:/app/data
    depends_on:
      - nats
      - processor
      - db
    restart: unless-stopped
    networks:
      - data-assistant-net

volumes:
  chat-data:
  nats-data:
  pg-data:

networks:
  data-assistant-net:
    driver: bridge
